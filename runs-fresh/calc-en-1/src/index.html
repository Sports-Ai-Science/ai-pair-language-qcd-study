<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scientific Calculator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app" class="app" aria-label="Scientific calculator"></main>
  <!-- Load order matters: engine -> state -> ui (no ES modules; required for file://). -->
  <script src="engine.js"></script>
  <script src="state.js"></script>
  <script src="ui.js"></script>
  <script>
    (function () {
      var root = document.getElementById("app");
      var state = globalThis.CalcState.create();
      globalThis.CalcUI.mount(root, state, globalThis.CalcEngine);
    })();
  </script>
</body>
</html>
